// ── LOCAL STORAGE (backup) ────────────────────────────────────────
const LS_STOCK = "rc_stock_v3";
const LS_LOG   = "rc_log_v3";
const LS_ENT   = "rc_ent_v3";
const LS_DIA   = "rc_dia_v3";

function saveLocal() {
  try {
    localStorage.setItem(LS_STOCK, JSON.stringify(stock.map(({id,cantidad})=>({id,cantidad}))));
    localStorage.setItem(LS_LOG,   JSON.stringify(log.slice(0,80)));
    localStorage.setItem(LS_ENT,   JSON.stringify(entrenos));
    localStorage.setItem(LS_DIA,   String(diaIdx));
  } catch {}
}

function loadLocal() {
  try {
    const s = localStorage.getItem(LS_STOCK);
    const l = localStorage.getItem(LS_LOG);
    const e = localStorage.getItem(LS_ENT);
    const d = localStorage.getItem(LS_DIA);
    if (s) { const g=JSON.parse(s); stock=STOCK_DEFAULT.map(i=>{ const f=g.find(x=>x.id===i.id); return f?{...i,cantidad:f.cantidad}:{...i}; }); }
    if (l) log = JSON.parse(l);
    if (e) entrenos = JSON.parse(e);
    if (d) diaIdx = parseInt(d)||0;
    return !!(s||l||e);
  } catch { return false; }
}

// ── SHEETS READ ───────────────────────────────────────────────────
async function readSheet(sheetName) {
  try {
    const url = SHEETS_API + encodeURIComponent(sheetName) + "&t=" + Date.now();
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.replace("/*O_o*/\ngoogle.visualization.Query.setResponse(","").replace(/\);?\s*$/,""));
    return json.table;
  } catch { return null; }
}

function tableToObjects(table) {
  if (!table || !table.rows) return [];
  const cols = table.cols.map(c=>c.label);
  return table.rows.map(row => {
    const obj = {};
    cols.forEach((col,i) => { obj[col] = row.c[i]?.v ?? ""; });
    return obj;
  });
}

// ── GOOGLE APPS SCRIPT WRITE ──────────────────────────────────────
async function writeToSheet(action, data) {
  // Guardamos en localStorage como backup inmediato
  saveLocal();
  // Nota: para escritura real en Sheets necesitamos Apps Script
  // Por ahora usamos localStorage como persistencia principal
}

// ── CARGAR TODO ───────────────────────────────────────────────────
async function cargarTodo() {
  // Primero cargamos local para que la app sea instantánea
  loadLocal();
  renderAll();
  
  // Luego intentamos leer desde Sheets
  try {
    const [tStock, tLog, tEnt, tDia] = await Promise.all([
      readSheet("stock"),
      readSheet("log"),
      readSheet("entrenos"),
      readSheet("config"),
    ]);

    let changed = false;

    if (tStock) {
      const rows = tableToObjects(tStock);
      if (rows.length > 0) {
        stock = STOCK_DEFAULT.map(item => {
          const f = rows.find(r => r.id === item.id);
          return f && f.cantidad !== "" ? {...item, cantidad: Number(f.cantidad)} : {...item};
        });
        changed = true;
      }
    }
    if (tLog) {
      const rows = tableToObjects(tLog);
      if (rows.length > 0) { log = rows; changed = true; }
    }
    if (tEnt) {
      const rows = tableToObjects(tEnt);
      if (rows.length > 0) { entrenos = rows; changed = true; }
    }
    if (tDia) {
      const rows = tableToObjects(tDia);
      const d = rows.find(r=>r.key==="diaIdx");
      if (d) { diaIdx = parseInt(d.value)||0; changed = true; }
    }

    if (changed) { saveLocal(); renderAll(); }
  } catch {}

  setSyncTime();
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

function setSyncTime() {
  const t = new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
  const el = document.getElementById("sync-text");
  if (el) el.textContent = "Sync " + t;
}

// ── HELPERS ───────────────────────────────────────────────────────
function fmtQ(item) {
  if (item.unidad==="g"  && item.cantidad>=1000) return (item.cantidad/1000).toFixed(1).replace(/\.0$/,"") + " kg";
  if (item.unidad==="ml" && item.cantidad>=1000) return (item.cantidad/1000).toFixed(2).replace(/\.?0+$/,"") + " L";
  if (item.unidad==="ml") return item.cantidad + " ml";
  return item.cantidad + " " + item.unidad;
}
function barPct(item) {
  const orig = STOCK_DEFAULT.find(d=>d.id===item.id)?.cantidad ?? 4;
  return Math.min(100, Math.round((item.cantidad/Math.max(orig,1))*100));
}
function getBarColor(item) {
  if (item.cantidad<=0) return "#ef4444";
  if (item.cantidad<=item.minimo) return "#f97316";
  return COL[item.cat]?.ac || "#22c55e";
}

  } else {
    log.forEach(e => {
      const items = typeof e.items === "string" ? JSON.parse(e.items||"[]") : (e.items||[]);
      html += `<div class="card">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:13px;font-weight:800;color:#22c55e">🍽️ ${e.momento}</span>
          <span style="font-size:11px;color:#64748b">${e.ts}</span>
        </div>
        <div style="font-size:12px;color:#94a3b8;margin-bottom:8px">👤 ${e.quien}</div>`;
      items.forEach(it => {
        html += `<div style="background:#0f172a;border-radius:8px;padding:6px 12px;margin-bottom:4px;font-size:13px;display:flex;justify-content:space-between">
          <span>${it.emoji||""} ${it.nombre}</span>
          <span style="color:#f87171;font-weight:700">-${it.qty} ${it.unidad}</span>
        </div>`;
      });
      html += `</div>`;
    });
    html += `<button class="btn" style="color:#f87171;border-color:#7f1d1d;margin-top:4px;margin-bottom:20px" onclick="if(confirm('Borrar historial?')) clearLog()">🗑 Borrar historial</button>`;
  }
  document.getElementById("vista-log").innerHTML = html;
}

// ── ACCIONES ──────────────────────────────────────────────────────
function setVista(v) {
  vistaActual = v;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");
  ["plan","entrenos","stock","consumir","log"].forEach(n => {
    document.getElementById("vista-"+n).classList.toggle("hidden", n!==v);
  });
}

function setDia(i) {
  diaIdx = i;
  saveLocal();
  renderPlan();
  renderAlerts();
}

function setPlanTab(t) {
  planTab = t;
  renderPlan();
}

function setCat(c) {
  catFiltro = c;
  renderStock();
}

function setBusq(v) {
  busq = v;
  renderStock();
}

function setQuien(q) {
  quien = q;
  renderConsumir();
}

function setMomento(m) {
  momento = m;
  renderConsumir();
}

function setUso(id, delta) {
  const item = stock.find(i=>i.id===id);
  uso[id] = Math.max(0, (Number(uso[id])||0) + delta);
  renderConsumir();
}

function setUsoVal(id, val) {
  uso[id] = Math.max(0, Number(val)||0);
}

function ajustar(id, delta) {
  stock = stock.map(i => i.id===id ? {...i, cantidad:Math.max(0,i.cantidad+delta)} : i);
  saveLocal();
  renderStock();
  renderAlerts();
}

function startEdit(id) {
  const item = stock.find(i=>i.id===id);
  const val = prompt(`Nueva cantidad para ${item.nombre} (actual: ${fmtQ(item)}):`, item.cantidad);
  if (val !== null && !isNaN(parseFloat(val)) && parseFloat(val)>=0) {
    stock = stock.map(i => i.id===id ? {...i, cantidad:parseFloat(val)} : i);
    saveLocal();
    renderStock();
    renderAlerts();
  }
}

function registrar() {
  const usados = Object.entries(uso).filter(([,v])=>Number(v)>0);
  if (!usados.length) { alert("No marcaste ningun consumo."); return; }
  
  const ts = new Date().toLocaleString("es-AR",{dateStyle:"short",timeStyle:"short"});
  const items = usados.map(([id,qty]) => {
    const it = stock.find(i=>i.id===id);
    return {emoji:it.emoji, nombre:it.nombre, qty:Number(qty), unidad:it.unidad};
  });
  
  stock = stock.map(i => {
    const q = Number(uso[i.id]||0);
    return q>0 ? {...i, cantidad:Math.max(0,i.cantidad-q)} : i;
  });
  
  log = [{ts, quien, momento, items}, ...log];
  uso = {};
  saveLocal();
  renderAll();
  
  const btn = document.getElementById("reg-btn");
  if (btn) { btn.textContent = "Registrado!"; btn.style.background = "#16a34a"; setTimeout(()=>renderConsumir(),2000); }
}

function marcarEntreno(sesionId, q, estado) {
  const ts = new Date().toLocaleString("es-AR",{dateStyle:"short",timeStyle:"short"});
  const existe = entrenos.find(e=>e.sesionId===sesionId&&e.quien===q);
  if (existe) {
    entrenos = entrenos.map(e=>e.sesionId===sesionId&&e.quien===q?{...e,estado,ts}:e);
  } else {
    entrenos = [...entrenos, {sesionId, quien:q, estado, nota:"", ts}];
  }
  saveLocal();
  renderEntrenos();
  renderAlerts();
}

function updateNota(sesionId, q, nota) {
  entrenos = entrenos.map(e=>e.sesionId===sesionId&&e.quien===q?{...e,nota}:e);
  saveLocal();
}

function clearLog() {
  log = [];
  saveLocal();
  renderLog();
}

// ── INIT ──────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  // Mostrar app inmediatamente con datos locales
  const hasLocal = loadLocal();
  if (hasLocal) {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    renderAll();
    setSyncTime();
  }
  // Siempre intentar cargar desde Sheets
  cargarTodo();
});
</script>
