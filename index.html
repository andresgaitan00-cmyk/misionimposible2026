function hoy(){return new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"2-digit"});}
function saveLocal(){try{localStorage.setItem(SK,JSON.stringify(stock.map(({id,q})=>({id,q}))));localStorage.setItem(LK,JSON.stringify(log.slice(0,100)));localStorage.setItem(EK,JSON.stringify(entrenos));localStorage.setItem(DK,String(diaIdx));localStorage.setItem(AK,JSON.stringify(agua));}catch{}}
function loadLocal(){
  try{
    const s=localStorage.getItem(SK),l=localStorage.getItem(LK),e=localStorage.getItem(EK),d=localStorage.getItem(DK),a=localStorage.getItem(AK);
    if(s){const g=JSON.parse(s);stock=SD.map(i=>{const f=g.find(x=>x.id===i.id);return f?{...i,q:f.q}:{...i};});}
    if(l)log=JSON.parse(l);
    if(e)entrenos=JSON.parse(e);
    if(d)diaIdx=parseInt(d)||0;
    if(a){agua=JSON.parse(a);if(agua.fecha!==hoy())agua={ray:0,cyn:0,fecha:hoy()};}
    return !!(s||l||e);
  }catch{return false;}
}
async function saveRemote(){
  saveLocal();
  try{
    await fetch(BURL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify({stock:stock.map(({id,q})=>({id,q})),log:log.slice(0,100),entrenos,dia:diaIdx,agua})});
    setST();
  }catch{}
}
async function cargar(){
  try{
    const r=await fetch(BURL+"/latest",{headers:{"X-Master-Key":API_KEY,"X-Bin-Meta":false}});
    if(!r.ok)throw new Error();
    const d=await r.json();
    let ch=false;
    if(d.stock&&d.stock.length){stock=SD.map(i=>{const f=d.stock.find(x=>x.id===i.id);return f?{...i,q:f.q}:{...i};});ch=true;}
    if(d.log&&d.log.length){log=d.log;ch=true;}
    if(d.entrenos&&d.entrenos.length){entrenos=d.entrenos;ch=true;}
    if(d.dia!=null){diaIdx=parseInt(d.dia)||0;ch=true;}
    if(d.agua){agua=d.agua.fecha===hoy()?d.agua:{ray:0,cyn:0,fecha:hoy()};ch=true;}

function setST(){const t=new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});const el=document.getElementById("syt");if(el)el.textContent="Sync "+t;}
function fQ(i){
  if(i.u==="g"&&i.q>=1000)return +(i.q/1000).toFixed(2).replace(/\.?0+$/,"")+" kg";
  if(i.u==="ml"&&i.q>=1000)return +(i.q/1000).toFixed(2).replace(/\.?0+$/,"")+" L";
  if(i.u==="ml")return i.q+" ml";
  return i.q+" "+i.u;
}
function bP(i){const o=SD.find(d=>d.id===i.id)?.q??4;return Math.min(100,Math.round((i.q/Math.max(o,1))*100));}

  ["Todas",...CATS].forEach(c=>{const ac=COL[c]?.ac||"#22c55e",on=catF===c;h+=`<button class="btn" onclick="setCat('${c}')" style="${on?`background:${ac};color:#0f172a;border-color:${ac}`:""}"> ${c}</button>`;});
  h+=`</div>`;
  CATS.filter(c=>catF==="Todas"||catF===c).forEach(cn=>{
    const items=fil.filter(i=>i.c===cn);
    if(!items.length)return;
    const col=COL[cn];
    h+=`<div class="cl" style="color:${col.ac}">${cn}</div>`;
    items.forEach(item=>{
      const p=bP(item),em=item.q<=0,lw=!em&&item.q<=item.m,bc=gBC(item),urg=item.urg;
      h+=`<div class="card" style="background:${em?"#1f0808":lw?"#1f1208":urg?"#1a1a08":col.bg};border-color:${em?"#7f1d1d":lw?"#78350f":urg?"#854d0e":"#334155"}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div style="flex:1;margin-right:8px">
            <div style="font-size:15px;font-weight:700">${item.e} ${item.n}</div>
            ${urg?`<div style="font-size:10px;color:#fbbf24;margin-top:2px">⚠️ Usar pronto</div>`:""}
          </div>
          ${em?`<span class="bdg" style="background:#7f1d1d;color:#fca5a5">AGOTADO</span>`:""}
          ${lw&&!em?`<span class="bdg" style="background:#78350f;color:#fdba74">POCO</span>`:""}
        </div>
        <div class="bw"><div class="bf" style="width:${p}%;background:${bc}"></div></div>
        <div class="ctl">
          <button class="cir" onclick="adj('${item.id}',${-item.s})">-</button>
          <span style="min-width:80px;text-align:center;font-weight:800;font-size:15px;cursor:pointer;color:${bc}" onclick="edQ('${item.id}')">${fQ(item)}</span>
          <button class="cir" onclick="adj('${item.id}',${item.s})">+</button>
          <span style="font-size:11px;color:#475569">+/-${item.s} ${item.u}</span>
        </div>
      </div>`;
    });
  });
  document.getElementById("v-stock").innerHTML=h;
}

function rCon(){
  let h=`<div class="card" style="background:#111827;border-color:#374151;margin-bottom:16px">
    <div style="font-size:12px;font-weight:800;color:#9ca3af;margin-bottom:8px">Quien y cuando?</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">`;
  QUIENES.forEach(q=>{h+=`<button class="btn ${quien===q?"bp":""}" onclick="setQ('${q}')">${q}</button>`;});
  h+=`</div><div style="display:flex;gap:8px;flex-wrap:wrap">`;
  MOMS.forEach(m=>{h+=`<button class="btn ${mom===m?"bg":""}" onclick="setM('${m}')">${m}</button>`;});
  h+=`</div></div><div style="font-size:12px;color:#64748b;margin-bottom:12px">Cuanto consumiste:</div>`;
  CATS.forEach(cn=>{
    const items=stock.filter(i=>i.c===cn&&i.q>0);
    if(!items.length)return;
    const col=COL[cn];
    h+=`<div class="cl" style="color:${col.ac}">${cn}</div>`;
    items.forEach(item=>{
      const q=uso[item.id]||0;
      h+=`<div class="card" style="background:${col.bg};display:flex;align-items:center;justify-content:space-between">
        <div style="flex:1;margin-right:10px">
          <div style="font-size:14px;font-weight:700">${item.e} ${item.n}</div>
          <div style="font-size:11px;color:#64748b">Disponible: ${fQ(item)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <button class="cir" onclick="sU('${item.id}',${-item.s})">-</button>
          <input type="number" min="0" value="${q}" style="background:#0f172a;border:1px solid #475569;color:#f1f5f9;border-radius:8px;padding:5px 8px;font-size:14px;width:60px;text-align:center;outline:none" onchange="sUV('${item.id}',this.value)">
          <button class="cir" onclick="sU('${item.id}',${item.s})">+</button>
        </div>
      </div>`;
    });
  });
  h+=`<button class="rbtn" id="rb" style="background:#22c55e;color:#0f172a" onclick="reg()">Registrar · ${mom} · ${quien}</button>`;
  document.getElementById("v-consumir").innerHTML=h;
}

function rLog(){
  let h="";
  if(!log.length){h=`<div style="text-align:center;color:#475569;padding:50px 0;font-size:14px">Todavia no hay consumos.</div>`;}
  else{
    log.forEach(en=>{
      const items=typeof en.items==="string"?JSON.parse(en.items||"[]"):(en.items||[]);
      h+=`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:800;color:#22c55e">🍽️ ${en.momento||""}</span><span style="font-size:11px;color:#64748b">${en.ts||""}</span></div><div style="font-size:12px;color:#94a3b8;margin-bottom:8px">👤 ${en.quien||""}</div>`;
      items.forEach(it=>{h+=`<div style="background:#0f172a;border-radius:8px;padding:6px 12px;margin-bottom:4px;font-size:13px;display:flex;justify-content:space-between"><span>${it.e||""} ${it.n||""}</span><span style="color:#f87171;font-weight:700">-${it.qty} ${it.u||""}</span></div>`;});
      h+=`</div>`;
    });
    h+=`<button class="btn" style="color:#f87171;border-color:#7f1d1d;margin-top:4px;margin-bottom:20px" onclick="if(confirm('Borrar historial?')){log=[];saveRemote();rLog();}">🗑 Borrar historial</button>`;
  }
  document.getElementById("v-log").innerHTML=h;
}

function setV(v,el){document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));el.classList.add("on");["plan","agua","entrenos","stock","consumir","log"].forEach(n=>document.getElementById("v-"+n).classList.toggle("hid",n!==v));}
function setDia(i){diaIdx=i;saveRemote();rPlan();rAlts();}
function setPT(t){pTab=t;rPlan();}
function setCat(c){catF=c;rStock();}
function setBusq(v){busq=v;rStock();}
function setQ(q){quien=q;rCon();}
function setM(m){mom=m;rCon();}
function sU(id,d){uso[id]=Math.max(0,(Number(uso[id])||0)+d);rCon();}
function sUV(id,v){uso[id]=Math.max(0,Number(v)||0);}
function adj(id,d){stock=stock.map(i=>i.id===id?{...i,q:Math.max(0,i.q+d)}:i);saveRemote();rStock();rAlts();}
function edQ(id){const it=stock.find(i=>i.id===id);const v=prompt(`Nueva cantidad para ${it.n}:`,it.q);if(v!==null&&!isNaN(parseFloat(v))&&parseFloat(v)>=0){stock=stock.map(i=>i.id===id?{...i,q:parseFloat(v)}:i);saveRemote();rStock();rAlts();}}
function reg(){
  const usados=Object.entries(uso).filter(([,v])=>Number(v)>0);
  if(!usados.length){alert("No marcaste ningun consumo.");return;}
  const ts=new Date().toLocaleString("es-AR",{dateStyle:"short",timeStyle:"short"});
  const items=usados.map(([id,qty])=>{const it=stock.find(i=>i.id===id);return{e:it.e,n:it.n,qty:Number(qty),u:it.u};});
  stock=stock.map(i=>{const q=Number(uso[i.id]||0);return q>0?{...i,q:Math.max(0,i.q-q)}:i;});
  log=[{ts,quien,momento:mom,items},...log];
  uso={};saveRemote();renderAll();
  const rb=document.getElementById("rb");
  if(rb){rb.textContent="Registrado!";rb.style.background="#16a34a";setTimeout(()=>rCon(),2000);}
}
function mEnt(sId,q,estado){
  const ts=new Date().toLocaleString("es-AR",{dateStyle:"short",timeStyle:"short"});
  const ex=entrenos.find(e=>e.id===sId&&e.q===q);
  if(ex)entrenos=entrenos.map(e=>e.id===sId&&e.q===q?{...e,e:estado,t:ts}:e);
  else entrenos=[...entrenos,{id:sId,q,e:estado,n:"",t:ts}];
  saveRemote();rEnt();rAlts();
}
function uNota(sId,q,nota){entrenos=entrenos.map(e=>e.id===sId&&e.q===q?{...e,n:nota}:e);saveRemote();}
function addA(p,ml){if(agua.fecha!==hoy())agua={ray:0,cyn:0,fecha:hoy()};agua[p]=Math.min(3000,agua[p]+ml);saveRemote();rAgua();rAlts();}
function resetA(p){agua[p]=0;saveRemote();rAgua();rAlts();}

window.addEventListener("DOMContentLoaded",()=>{
  loadLocal();
  if(agua.fecha!==hoy())agua={ray:0,cyn:0,fecha:hoy()};
  document.getElementById("ld").classList.add("hid");
  document.getElementById("app").classList.remove("hid");
  renderAll();setST();
  setTimeout(()=>cargar(),500);
});
</script>
</body>
</html>
