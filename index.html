function saveLocal(){
  try{
    localStorage.setItem(SK,JSON.stringify(stock.map(({id,q})=>({id,q}))));
    localStorage.setItem(LK,JSON.stringify(log.slice(0,80)));
    localStorage.setItem(EK,JSON.stringify(entrenos));
    localStorage.setItem(DK,String(diaIdx));
  }catch{}
}
function loadLocal(){
  try{
    const s=localStorage.getItem(SK),l=localStorage.getItem(LK),e=localStorage.getItem(EK),d=localStorage.getItem(DK);
    if(s){const g=JSON.parse(s);stock=STOCK_DEFAULT.map(i=>{const f=g.find(x=>x.id===i.id);return f?{...i,q:f.q}:{...i};});}
    if(l)log=JSON.parse(l);
    if(e)entrenos=JSON.parse(e);
    if(d)diaIdx=parseInt(d)||0;
    return !!(s||l||e);
  }catch{return false;}
}
async function saveRemote(){
  saveLocal();
  try{
    const data={
      stock:stock.map(({id,q})=>({id,q})),
      log:log.slice(0,80),
      entrenos:entrenos,
      dia:diaIdx
    };
    await fetch(BIN_URL,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
      body:JSON.stringify(data)
    });
    setSyncTime();
  }catch(e){console.log("save error",e);}
}
async function cargar(){
  try{
    const res=await fetch(BIN_URL+"/latest",{
      headers:{"X-Master-Key":API_KEY,"X-Bin-Meta":false}
    });
    if(!res.ok) throw new Error("fetch failed");
    const data=await res.json();
    let ch=false;
    if(data.stock&&data.stock.length>0){
      stock=STOCK_DEFAULT.map(i=>{const f=data.stock.find(x=>x.id===i.id);return f?{...i,q:f.q}:{...i};});
      ch=true;
    }
    if(data.log&&data.log.length>0){log=data.log;ch=true;}
    if(data.entrenos&&data.entrenos.length>0){entrenos=data.entrenos;ch=true;}
    if(data.dia!==undefined&&data.dia!==null){diaIdx=parseInt(data.dia)||0;ch=true;}
    if(ch){saveLocal();renderAll();}
  }catch(e){console.log("load error",e);}
  setSyncTime();
}
function setSyncTime(){const t=new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});const el=document.getElementById("sync-txt");if(el)el.textContent="Sync "+t;}
function fmtQ(i){
  if(i.u==="g"&&i.q>=1000)return +(i.q/1000).toFixed(2).replace(/\.?0+$/,"")+" kg";
  if(i.u==="ml"&&i.q>=1000)return +(i.q/1000).toFixed(2).replace(/\.?0+$/,"")+" L";
  if(i.u==="ml")return i.q+" ml";
  return i.q+" "+i.u;
}
function barPct(i){const orig=STOCK_DEFAULT.find(d=>d.id===i.id)?.q??4;return Math.min(100,Math.round((i.q/Math.max(orig,1))*100));}
function getBC(i){if(i.q<=0)return "#ef4444";if(i.q<=i.m)return "#f97316";return COL[i.cat]?.ac||"#22c55e";}

        <div style="flex:1;margin-right:10px">
          <div style="font-size:14px;font-weight:700">${item.emoji} ${item.n}</div>
          <div style="font-size:11px;color:#64748b">Disponible: ${fmtQ(item)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <button class="cir" onclick="setUso('${item.id}',${-item.s})">-</button>
          <input type="number" min="0" value="${q}" style="background:#0f172a;border:1px solid #475569;color:#f1f5f9;border-radius:8px;padding:5px 8px;font-size:14px;width:60px;text-align:center;outline:none" onchange="setUsoV('${item.id}',this.value)">
          <button class="cir" onclick="setUso('${item.id}',${item.s})">+</button>
        </div>
      </div>`;
    });
  });
  h+=`<button class="reg-btn" id="reg-btn" style="background:#22c55e;color:#0f172a" onclick="registrar()">Registrar · ${momento} · ${quien}</button>`;
  document.getElementById("v-consumir").innerHTML=h;
}

function renderLog(){
  let h="";
  if(!log.length){h=`<div style="text-align:center;color:#475569;padding:50px 0;font-size:14px">Todavia no hay consumos.<br><span style="font-size:12px">Usa Consumir para empezar.</span></div>`;}
  else{
    log.forEach(e=>{
      const items=typeof e.items==="string"?JSON.parse(e.items||"[]"):(e.items||[]);
      h+=`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:800;color:#22c55e">🍽️ ${e.momento}</span><span style="font-size:11px;color:#64748b">${e.ts}</span></div><div style="font-size:12px;color:#94a3b8;margin-bottom:8px">👤 ${e.quien}</div>`;
      items.forEach(it=>{h+=`<div style="background:#0f172a;border-radius:8px;padding:6px 12px;margin-bottom:4px;font-size:13px;display:flex;justify-content:space-between"><span>${it.emoji||""} ${it.n||it.nombre}</span><span style="color:#f87171;font-weight:700">-${it.qty} ${it.u||it.unidad}</span></div>`;});
      h+=`</div>`;
    });
    h+=`<button class="btn" style="color:#f87171;border-color:#7f1d1d;margin-top:4px;margin-bottom:20px" onclick="if(confirm('Borrar historial?')){log=[];saveRemote();renderLog();}">🗑 Borrar historial</button>`;
  }
  document.getElementById("v-log").innerHTML=h;
}

function setV(v,el){document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));el.classList.add("on");["plan","entrenos","stock","consumir","log"].forEach(n=>document.getElementById("v-"+n).classList.toggle("hidden",n!==v));}
function setDia(i){diaIdx=i;saveRemote();renderPlan();renderAlerts();}
function setPTab(t){planTab=t;renderPlan();}
function setCat(c){catF=c;renderStock();}
function setBusq(v){busq=v;renderStock();}
function setQuien(q){quien=q;renderConsumir();}
function setMomento(m){momento=m;renderConsumir();}
function setUso(id,d){uso[id]=Math.max(0,(Number(uso[id])||0)+d);renderConsumir();}
function setUsoV(id,v){uso[id]=Math.max(0,Number(v)||0);}
function ajustar(id,d){stock=stock.map(i=>i.id===id?{...i,q:Math.max(0,i.q+d)}:i);saveRemote();renderStock();renderAlerts();}
function editQ(id){
  const item=stock.find(i=>i.id===id);
  const v=prompt(`Nueva cantidad para ${item.n} (actual: ${fmtQ(item)}):`,item.q);
  if(v!==null&&!isNaN(parseFloat(v))&&parseFloat(v)>=0){stock=stock.map(i=>i.id===id?{...i,q:parseFloat(v)}:i);saveRemote();renderStock();renderAlerts();}
}
function registrar(){
  const usados=Object.entries(uso).filter(([,v])=>Number(v)>0);
  if(!usados.length){alert("No marcaste ningun consumo.");return;}
  const ts=new Date().toLocaleString("es-AR",{dateStyle:"short",timeStyle:"short"});
  const items=usados.map(([id,qty])=>{const it=stock.find(i=>i.id===id);return{emoji:it.emoji,n:it.n,qty:Number(qty),u:it.u};});
  stock=stock.map(i=>{const q=Number(uso[i.id]||0);return q>0?{...i,q:Math.max(0,i.q-q)}:i;});
  log=[{ts,quien,momento,items},...log];
  uso={};saveRemote();renderAll();
  const btn=document.getElementById("reg-btn");
  if(btn){btn.textContent="Registrado!";btn.style.background="#16a34a";setTimeout(()=>renderConsumir(),2000);}
}
function marcarEnt(sesionId,q,estado){
  const ts=new Date().toLocaleString("es-AR",{dateStyle:"short",timeStyle:"short"});
  const existe=entrenos.find(e=>e.sesionId===sesionId&&e.quien===q);
  if(existe)entrenos=entrenos.map(e=>e.sesionId===sesionId&&e.quien===q?{...e,estado,ts}:e);
  else entrenos=[...entrenos,{sesionId,quien:q,estado,nota:"",ts}];
  saveRemote();renderEntrenos();renderAlerts();
}
function updateNota(sesionId,q,nota){entrenos=entrenos.map(e=>e.sesionId===sesionId&&e.quien===q?{...e,nota}:e);saveRemote();}

window.addEventListener("DOMContentLoaded",()=>{
  // Mostrar app inmediatamente con defaults o datos locales
  loadLocal();
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  renderAll();
  setSyncTime();
  // Intentar sincronizar con Google Sheets en background (sin bloquear)
  setTimeout(()=>{ cargar(); }, 500);
});
</script>
</body>
